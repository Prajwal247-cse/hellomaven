---
- name: Deploy Maven Artifact (Jenkins User Accessible)
  hosts: localhost
  become: false

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: /home/monish/deployment
        state: directory
        mode: '0755'

    - name: Copy the artifact to the deployment directory
      ansible.builtin.copy:
        src: /mnt/c/Users/MONISH/.jenkins/workspace/Hellomavenci/target/HelloMaven-1.0-SNAPSHOT.jar
        dest: /home/monish/deployment/HelloMaven.jar
        remote_src: yes