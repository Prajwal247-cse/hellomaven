---
- name: Deploy Maven Artifact (Jenkins User Accessible)
  hosts: localhost
  become: yes

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: /home/prajwal/deployment
        state: directory
        mode: '0755'

    - name: Copy the artifact to the deployment directory
      ansible.builtin.copy:
        src: /mnt/e/Java_proj/HelloMaven/target/HelloMaven-1.0-SNAPSHOT.jar
        dest: /home/prajwal/deployment/HelloMaven.jar
        remote_src: yes